<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    >
    <title>Kunkunshi Editor</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        font-size: 10px;
        font-family: sans-serif;
      }

      body {
        font-size: 1.5rem;
      }

      .notes {
        padding: 1rem;
        direction: rtl;
        display: grid;
        justify-content: start;
        align-items: center;
        align-content: center;
        grid-auto-flow: column;
        column-gap: 1rem;
        outline: 1px solid black;
      }

      .rows_12 {
        grid-template-rows: repeat(12, auto);
      }

      .rows_16 {
        grid-template-rows: repeat(16, auto);
      }

      .cell {
        width: 4rem;
        height: 5rem;
        text-align: center;
        box-shadow: -1px 0px 0px 0px rgba(0, 0, 0, 1), 1px 0px 0px 0px rgba(0, 0, 0, 1), inset 0px 1px 0px 0px rgba(0, 0, 0, 0.1), 0px 1px 0px 0px rgba(0, 0, 0, 0.1);

        display: grid;
        grid-template-rows: 1fr;
        justify-content: center;
        align-items: center;
      }

      .cell.parts_2.part_0.part_1 {
        grid-template-rows: 1fr 0;
        position: relative;
      }

      .cell.parts_2.part_0.part_1 .cellPart_1 {
        display: block;
        position: absolute;
        bottom: -1.1rem;
        left: 0;
        width: 4rem;
        text-align: center;
      }

      .cell.parts_2.part_0.no_part_1 {
        grid-template-rows: 1fr;
      }

    </style>
  </head>

  <body>

    <div id="app">

      <header>
        <h1>Kunkunshi Editor</h1>
      </header>

      <nav></nav>

      <aside></aside>

      <article>

        <div
          class="notes"
          :class="'rows_' + this.rows"
        >
          <div
            v-for="cell in board"
            class="cell"
            v-bind:class="{
              [ 'parts_' + cell.content.length ]: true,
              part_0: !!cell.content[ 0 ],
              part_1: !!cell.content[ 1 ],
              part_2: !!cell.content[ 2 ],
              part_3: !!cell.content[ 3 ],
              no_part_0: !cell.content[ 0 ],
              no_part_1: !cell.content[ 1 ],
              no_part_2: !cell.content[ 2 ],
              no_part_3: !cell.content[ 3 ]
            }"
          >
            <div class="cellPart cellPart_0">{{ cell.content[ 0 ] }}</div>
            <div
              v-if="1 < cell.content.length"
              class="cellPart cellPart_1"
            >{{ cell.content[ 1 ] }}</div>
            <div
              v-if="2 < cell.content.length"
              class="cellPart cellPart_2"
            >{{ cell.content[ 2 ] }}</div>
            <div
              v-if="3 < cell.content.length"
              class="cellPart cellPart_3"
            >{{ cell.content[ 3 ] }}</div>
          </div>
        </div>

      </article>

      <footer>
        <p>Clement MENORET</p>
      </footer>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>

    <script>
      const isSet = v => ( null === v ) || ( 'undefined' === typeof v )

      var app = new Vue( {
        el: '#app',
        data: {

            { key: '乙', romaji: 'OTSU' },
            { key: '老', romaji: 'ROO' },
            { key: '四', romaji: [ 'YON', 'SHI' ] },
            { key: '上', romaji: [ 'JOO', 'HUE' ] },
            { key: '中', romaji: [ 'NAKA', 'CHUU' ] },
            { key: '尺', romaji: 'SHAKU' },
            { key: '工', romaji: 'KO' },
            { key: '五', romaji: 'GO' },
            { key: '六', romaji: 'ROKU' },
            { key: '七', romaji: 'SHICHI' },
            { key: '八', romaji: 'HACHI' },
            { key: '九', romaji: 'KYU' }
          ],
          alterations: [
            { key: '下', position: 'left', romaji: 'SHITA' },
            // { key: '♭', position: 'right', romaji: 'FLAT' },
            // { key: '♮', position: 'right', romaji: 'NATURAL' },
            { key: '♯', position: 'right', romaji: 'SHARP' },
            { key: '`', position: 'right', romaji: 'TAP' },
            { key: '⌝', position: 'right', romaji: 'UPWARD' },
          ],
          rows: 12,
          board: []
        },
        methods: {
          addColumn: function( n ) {
            const lastCellIndex = n - 1
            for ( let index = 0; index < n; index += 1 ) {
              this.board.push( { content: [ '', '', '', '' ] } )
            }
          },
          import: function( songData ) {
            if ( Array.isArray( songData.boardContents ) ) {
              this.board = []
              const nColumnsRequired = Math.ceil( songData.boardContents.length / this.rows )
              for ( let index = 0; index < nColumnsRequired; index += 1 ) {
                this.addColumn( this.rows )
              }
              const newBoard = [ ...this.board ]
              songData.boardContents.forEach( ( content, i ) => newBoard[ i ].content = content )
              this.board = newBoard
            }
