<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    >
    <title>Kunkunshi Editor</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        font-size: 10px;
        font-family: sans-serif;
      }

      body {
        font-size: 1.5rem;
      }

      .notes {
        padding: 1rem;
        direction: rtl;
        display: grid;
        justify-content: start;
        align-items: center;
        align-content: center;
        grid-auto-flow: column;
        column-gap: 1rem;
        outline: 1px solid black;
      }

      .rows_12 {
        grid-template-rows: repeat(24, auto);
      }

      .rows_16 {
        grid-template-rows: repeat(32, auto);
      }

      .cell {
        width: 4rem;
        height: 2rem;
        text-align: center;
        box-shadow: -1px 0px 0px 0px black, -1px 0px 0px 0px black inset;
      }

      .cell.selected {
        background-color: rgba(0, 128, 196, .5);
      }

      .halfCell_0 {
        position: relative;
        font-size: 120%;
      }

      .halfCell_1 {
        position: relative;
        font-size: 80%;
      }

      .halfCell_0.top {
        padding-top: 1rem;
        box-shadow: 0px 1px 0px 0px black inset, -1px 0px 0px 0px black, -1px 0px 0px 0px black inset;
      }

      .halfCell_1:not(.bottom):after {
        display: block;
        position: absolute;
        left: 0;
        top: 50%;
        height: 1px;
        background: rgba(0, 0, 0, .1);
        content: '';
        width: 100%;
      }

      .halfCell_0.preBottom {
        padding-bottom: 1rem;
      }

      .halfCell_1.bottom {
        box-shadow: 0px 1px 0px 0px black inset;
      }

      /* .halfCell_2 {
        box-shadow: 0px -1px 0px 0px black inset, 1px 0px 0px 0px black inset, -1px 0px 0px 0px black inset;
      } */

    </style>
  </head>

  <body>

    <div id="app">

      <header>
        <h1>Kunkunshi Editor</h1>
      </header>

      <nav></nav>

      <aside></aside>

      <article>

        <div
          class="notes"
          :class="'rows_' + this.rows"
        >
          <div
            v-for="(halfCell, index) in board"
            class="cell"
            v-bind:class="{
              [ 'halfCell_' + ( index % 2 ) ]: true,
              top: halfCell.bTop,
              preBottom: halfCell.bPreBottom,
              bottom: halfCell.bBottom,
              selected: halfCell.bSelected
            }"
          >{{ halfCell.content }}</div>
        </div>

      </article>

      <footer>
        <p>Clement MENORET</p>
      </footer>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>

    <script>
      const isSet = v => ( null === v ) || ( 'undefined' === typeof v )

      var app = new Vue( {
        el: '#app',
        data: {
          pause: [
            { key: '○' }
          ],
          notes: [
            { key: '合', romaji: 'AI' },
            { key: '乙', romaji: 'OTSU' },
            { key: '老', romaji: 'ROO' },
            { key: '四', romaji: 'SHI' },
            { key: '上', romaji: 'JOO' },
            { key: '中', romaji: 'CHUU' },
            { key: '尺', romaji: 'SHAKU' },
            { key: '工', romaji: 'KO' },
            { key: '五', romaji: 'GO' },
            { key: '六', romaji: 'ROKU' },
            { key: '七', romaji: 'SHICHI' },
            { key: '八', romaji: 'HACHI' },
            { key: '九', romaji: 'KYU' }
          ],
          alterations: [
            { key: '下', position: 'left', romaji: 'SHITA' },
            { key: '♯', position: 'right', romaji: 'SHARP' }
          ],
          rows: 12,
          board: []
        },
        methods: {
          addColumn: function( n ) {
            const maxHalfCellsPerRow = 2 * n
            const lastCellIndex = maxHalfCellsPerRow - 1
            for ( let index = 0; index < maxHalfCellsPerRow; index += 1 ) {
              this.board.push( {
                content: '',
                bTop: !index,
                bPreBottom: index === ( lastCellIndex - 1 ),
                bBottom: index === lastCellIndex,
                bSelected: false
              } )
            }
          },
          import: function( songData ) {
            if ( Array.isArray( songData.boardContents ) ) {
              this.board = []
              const nColumnsRequired = Math.ceil( songData.boardContents.length / ( this.rows * 2 ) )
              for (let index = 0; index < nColumnsRequired; index += 1 ) {
                this.addColumn( this.rows )
              }
              const newBoard = [ ...this.board ]
              songData.boardContents.forEach( ( content, i ) => newBoard[ i ].content = content )
              this.board = newBoard
            }
          }
        },
        created: function() {
          // init with asadoyayunta
          const asadoyayuntaData = {
            boardContents: [
              '中', '', '工', '', '七', '', '合', '四', '七', '', '合', '', '七', '', '七', '', '五', '', '工', '', '四', '', '上', '',
              '中', '', '工', '', '合', '', '工', '', '合', '', '五', '', '工', '', '○', '', '四', '', '合', '四', '上', '', '合', '',
              '中', '', '上', '', '合', '', '工', '', '合', '', '乙', '', '四', '', '中', '', '上', '', '老', '', '四', '', '○', '',
              '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '',
              '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '',
              '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '',
              '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '',
              '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', '', ''
            ]
          }
          this.import( asadoyayuntaData )
        }
      } )
    </script>
  </body>

</html>
